; Bamboard firmware (v0.3+) — Guition JC4827W543
; ESP32-S3-WROOM-1 + 4.3" IPS 480x272 (NV3041A, QSPI) + GT911 capacitive touch.
;
; The v0.x DevKitC + ILI9488 + buttons + WS2812 build is preserved in the
; tag v0.2.x if you want to compare; main targets the integrated board.

[platformio]
default_envs = esp32-s3-devkitc-1
description  = Bamboard - Bambuddy touch desk monitor

[env:esp32-s3-devkitc-1]
platform  = espressif32@6.7.0
board     = esp32-s3-devkitc-1   ; same WROOM-1 module sits on the Guition
framework = arduino

; --- USB / monitor ---
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed    = 921600

; --- Partitions ---
; 4 MB flash on the JC4827W543. The app (~1.4 MB with LVGL + LovyanGFX +
; WiFiManager + WebSockets + HTTPUpdate) overflows default.csv's 1.25 MB OTA
; slots, so we use min_spiffs.csv: still two OTA app slots — which is what the
; boot-time GitHub Releases updater flashes into (the new image lands in the
; inactive slot, then the bootloader swaps on reboot) — but ~1.875 MB each, at
; the cost of a tiny SPIFFS region Bamboard doesn't use (all config is in NVS).
board_build.partitions          = min_spiffs.csv
board_upload.flash_size         = 4MB
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L

; Root-CA bundle used to validate Bambuddy's TLS certificate in https mode. The
; .bin is generated at CI build time (scripts/gen_ca_bundle.sh, see the GitHub
; workflows) from the current Mozilla CA set and is NOT committed. embed_files
; exposes it as the linker symbol _binary_data_cert_x509_crt_bundle_bin_start,
; consumed via firmware/src/net/ca_bundle.h.
board_build.embed_files         = data/cert/x509_crt_bundle.bin

; --- Build flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; TouchLib: select the GT911 backend globally so the library's own
    ; translation units compile the GT911 path (mirrored in hw/display.cpp).
    -D TOUCH_MODULES_GT911

; --- Libraries ---
; Arduino_GFX is pinned to v1.4.9 — the last 1.4.x release, which still supports
; arduino-esp32 core 2.x (this project's platform = espressif32 6.7.0 → core
; 2.0.16). v1.5.0+ require core 3.x: they #include esp32-hal-periman.h, which
; doesn't exist on 2.x. v1.4.9 already ships Arduino_NV3041A + Arduino_ESP32QSPI.
; The GT911 TouchLib has no release tags, so it tracks its default branch (the
; repo's been frozen since 2023). LVGL is exact-pinned (its 8.x line has shipped
; API breakage); the rest are caret-pinned to track patch updates.
lib_deps =
    https://github.com/moononournation/Arduino_GFX.git#v1.4.9
    https://github.com/mmMicky/TouchLib.git
    lvgl/lvgl@=8.3.11
    bblanchon/ArduinoJson@^7.1.0
    tzapu/WiFiManager@^2.0.17
    ; Exact-pinned (not caret): beginSslWithBundle()'s signature changed across
    ; the 2.x line (gained a size param), and we depend on it to validate the
    ; wss:// certificate against the embedded CA bundle — see bambuddy_ws.cpp.
    links2004/WebSockets@=2.6.1
    bodmer/TJpg_Decoder@^1.1.0   ; JPEG decode (camera snapshots), native downscale
