; Bamboard firmware (v0.3+) — Guition JC4827W543
; ESP32-S3-WROOM-1 + 4.3" IPS 480x272 RGB-parallel + GT911 capacitive touch.
;
; The v0.x DevKitC + ILI9488 + buttons + WS2812 build is preserved in the
; tag v0.2.x if you want to compare; main targets the integrated board.

[platformio]
default_envs = esp32-s3-devkitc-1
description  = Bamboard - Bambuddy touch desk monitor

[env:esp32-s3-devkitc-1]
platform  = espressif32@6.7.0
board     = esp32-s3-devkitc-1   ; same WROOM-1 module sits on the Guition
framework = arduino

; --- USB / monitor ---
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed    = 921600

; --- Partitions ---
; 4 MB flash on the JC4827W543 — the stock layout keeps two OTA app slots,
; which is what the boot-time GitHub Releases updater flashes into (the new
; image lands in the inactive slot, then the bootloader swaps on reboot).
board_build.partitions          = default.csv
board_upload.flash_size         = 4MB
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.f_flash             = 80000000L
board_build.f_cpu               = 240000000L

; --- Build flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; LovyanGFX needs to know we want the ESP32-S3 RGB panel path
    -DLGFX_USE_V1

; --- Libraries ---
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.1.0
    tzapu/WiFiManager@^2.0.17
    links2004/WebSockets@^2.4.1
