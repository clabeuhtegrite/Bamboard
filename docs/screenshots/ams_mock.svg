<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard AMS overview — visual refresh, 1:1 scale of the JC4827W543 (480 x 272).

  Layout grid (target for firmware/src/ui/screens/ams.cpp):
    Header        : y =   0 ..  36   Bamboard wordmark · printer · link badge
    Body content  : y =  36 .. 228
      - status strip: [<] AMS 1/2 [>]  humidity  temp        : y =  40 ..  72
      - 4 slot cards (108 px wide, 8 px gap, 12 px gutter)    : y =  80 .. 224
    Tab bar       : y = 228 .. 272

  Showing AMS unit 1 of 2 (chevrons active). Unit 1 is a vanilla AMS so the
  Dry pill is hidden; swiping to the AMS-HT (unit 2) reveals it. Slots:
  PLA cyan / PETG green / EMPTY / TPU orange (low → error colour).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 272" width="480" height="272" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#00C6D4"/><stop offset="1" stop-color="#008F9B"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2B313B"/><stop offset="1" stop-color="#222831"/></linearGradient>
    <filter id="cardSh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/></filter>
    <symbol id="ic-home" viewBox="0 0 24 24"><path d="M4 11.2 12 4l8 7.2M6 10v9h12v-9M10 19v-5h4v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></symbol>
    <symbol id="ic-drop" viewBox="0 0 24 24"><path d="M12 3.2C12 3.2 5.5 10 5.5 14.5a6.5 6.5 0 0 0 13 0C18.5 10 12 3.2 12 3.2Z" fill="currentColor"/></symbol>
    <symbol id="ic-list" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 7h11M8 12h11M8 17h11"/><circle cx="4.2" cy="7" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="12" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="17" r="1.1" fill="currentColor" stroke="none"/></g></symbol>
    <symbol id="ic-loop" viewBox="0 0 24 24"><path d="M19 12a7 7 0 1 1-2.05-4.95M19 4v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-gear" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M12 2.6v3M12 18.4v3M21.4 12h-3M5.6 12h-3M18.6 5.4l-2.1 2.1M7.5 16.5l-2.1 2.1M18.6 18.6l-2.1-2.1M7.5 7.5 5.4 5.4"/></g></symbol>
    <symbol id="ic-wifi" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 9a13 13 0 0 1 16 0"/><path d="M7 12.4a8.5 8.5 0 0 1 10 0"/><path d="M9.6 15.7a4.2 4.2 0 0 1 4.8 0"/></g><circle cx="12" cy="18.6" r="1.3" fill="currentColor"/></symbol>
  </defs>

  <rect width="480" height="272" fill="#0E1116"/>

  <!-- Header -->
  <rect x="0" y="0" width="480" height="36" fill="#1A1F26"/>
  <rect x="0" y="35" width="480" height="1" fill="#2F3742"/>
  <rect x="12" y="13" width="10" height="10" rx="3" fill="url(#acc)"/>
  <text x="29" y="24" font-size="16" font-weight="700" fill="#E9EEF3">Bam<tspan fill="#00B7C3">board</tspan></text>
  <text x="248" y="23" font-size="13" text-anchor="middle" fill="#8A95A4">Workshop X1C</text>
  <g transform="translate(398,8)"><rect width="70" height="20" rx="10" fill="#15271F" stroke="#2F3742"/><use href="#ic-wifi" x="7" y="3" width="14" height="14" style="color:#39D98A"/><text x="26" y="14" font-size="11" font-weight="600" fill="#39D98A">36 ms</text></g>

  <!-- Status strip -->
  <g transform="translate(12,40)"><rect width="34" height="32" rx="12" fill="url(#panel)" stroke="#2F3742"/><path d="M20 8 L13 16 L20 24" fill="none" stroke="#E9EEF3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
  <text x="86" y="61" font-size="16" font-weight="700" fill="#00B7C3" text-anchor="middle">AMS 1 / 2</text>
  <g transform="translate(126,40)"><rect width="34" height="32" rx="12" fill="url(#panel)" stroke="#2F3742"/><path d="M14 8 L21 16 L14 24" fill="none" stroke="#E9EEF3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
  <!-- humidity (28% < 40 => ok colour) -->
  <use href="#ic-drop" x="186" y="48" width="16" height="16" style="color:#39D98A"/>
  <text x="206" y="61" font-size="14" font-weight="600" fill="#39D98A">28%</text>
  <!-- ambient temp -->
  <text x="270" y="61" font-size="14" font-weight="600" fill="#E9EEF3">29 °C</text>

  <!-- Slot cards: 4 x 108 @ x = 12,128,244,360 -->
  <!-- Slot 1 — PLA cyan 62% -->
  <g transform="translate(12,80)">
    <rect width="108" height="144" rx="12" fill="url(#panel)" stroke="#2F3742" filter="url(#cardSh)"/>
    <rect x="8" y="8" width="92" height="40" rx="8" fill="#00A0E9"/>
    <text x="10" y="70" font-size="14" font-weight="600" fill="#E9EEF3">PLA</text>
    <text x="10" y="100" font-size="22" font-weight="700" fill="#E9EEF3">62%</text>
    <rect x="8" y="122" width="92" height="8" rx="4" fill="#1A1F26"/>
    <rect x="8" y="122" width="57" height="8" rx="4" fill="#00B7C3"/>
  </g>
  <!-- Slot 2 — PETG green 88% -->
  <g transform="translate(128,80)">
    <rect width="108" height="144" rx="12" fill="url(#panel)" stroke="#2F3742" filter="url(#cardSh)"/>
    <rect x="8" y="8" width="92" height="40" rx="8" fill="#39D98A"/>
    <text x="10" y="70" font-size="14" font-weight="600" fill="#E9EEF3">PETG</text>
    <text x="10" y="100" font-size="22" font-weight="700" fill="#E9EEF3">88%</text>
    <rect x="8" y="122" width="92" height="8" rx="4" fill="#1A1F26"/>
    <rect x="8" y="122" width="81" height="8" rx="4" fill="#39D98A"/>
  </g>
  <!-- Slot 3 — empty -->
  <g transform="translate(244,80)">
    <rect width="108" height="144" rx="12" fill="url(#panel)" stroke="#2F3742" filter="url(#cardSh)"/>
    <rect x="8" y="8" width="92" height="40" rx="8" fill="#252B34" stroke="#2F3742" stroke-dasharray="3 3"/>
    <text x="10" y="70" font-size="14" font-weight="600" fill="#8A95A4">EMPTY</text>
    <text x="10" y="100" font-size="22" font-weight="700" fill="#8A95A4">—</text>
    <rect x="8" y="122" width="92" height="8" rx="4" fill="#1A1F26"/>
  </g>
  <!-- Slot 4 — TPU orange 12% (error colour < 15) -->
  <g transform="translate(360,80)">
    <rect width="108" height="144" rx="12" fill="url(#panel)" stroke="#2F3742" filter="url(#cardSh)"/>
    <rect x="8" y="8" width="92" height="40" rx="8" fill="#F5A524"/>
    <text x="10" y="70" font-size="14" font-weight="600" fill="#E9EEF3">TPU</text>
    <text x="10" y="100" font-size="22" font-weight="700" fill="#E5484D">12%</text>
    <rect x="8" y="122" width="92" height="8" rx="4" fill="#1A1F26"/>
    <rect x="8" y="122" width="11" height="8" rx="4" fill="#E5484D"/>
  </g>

  <!-- Tab bar (AMS = index 1) -->
  <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
  <rect x="0" y="228" width="480" height="1" fill="#2F3742"/>
  <rect x="98" y="229" width="92" height="43" fill="#0E2A2E" opacity="0.55"/>
  <rect x="108" y="228" width="72" height="3" rx="2" fill="url(#acc)"/>
  <g text-anchor="middle">
    <use href="#ic-home" x="38" y="234" width="20" height="20" style="color:#8A95A4"/><text x="48" y="266" font-size="10" fill="#8A95A4">Live</text>
    <use href="#ic-drop" x="134" y="234" width="20" height="20" style="color:#00B7C3"/><text x="144" y="266" font-size="10" fill="#00B7C3">AMS</text>
    <use href="#ic-list" x="230" y="234" width="20" height="20" style="color:#8A95A4"/><text x="240" y="266" font-size="10" fill="#8A95A4">Printers</text>
    <use href="#ic-loop" x="326" y="234" width="20" height="20" style="color:#8A95A4"/><text x="336" y="266" font-size="10" fill="#8A95A4">History</text>
    <use href="#ic-gear" x="422" y="234" width="20" height="20" style="color:#8A95A4"/><text x="432" y="266" font-size="10" fill="#8A95A4">Settings</text>
  </g>
</svg>
