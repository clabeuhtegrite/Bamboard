<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard v1.1 Printers list, 1:1 scale of the JC4827W543 (480 x 272).

  Layout (matches firmware/src/ui/screens/printers.cpp):
    Header  : y =   0 ..  36
    Body    : y =  36 .. 228 — vertical column of 50-px rows, 6-px gap
    Tab bar : y = 228 .. 272

  Mockup shows 4 printers; the focused one (Workshop X1C, currently
  printing) carries a 2 px accent border. Tap any row to focus it and
  jump to the Live dashboard.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 272" width="480" height="272">
  <style>
    .t   { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #E9EEF3; }
    .dim { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #8A95A4; }
    .ac  { fill: #00B7C3; }
    .ok  { fill: #39D98A; }
    .warn{ fill: #F5A524; }
    .err { fill: #E5484D; }
  </style>

  <!-- Background -->
  <rect width="480" height="272" fill="#0E1116"/>

  <!-- ============ Header ============ -->
  <rect x="0" y="0"  width="480" height="36" fill="#1A1F26"/>
  <rect x="0" y="35" width="480" height="1"  fill="#2F3742"/>
  <text class="t ac" x="12"  y="24" font-size="18" font-weight="700">Bamboard</text>
  <text class="t"    x="240" y="22" font-size="14" text-anchor="middle">Workshop X1C</text>
  <text class="ok"   x="468" y="22" font-size="12" text-anchor="end" font-weight="600">▲ 36 ms</text>

  <!-- ============ Rows ============ -->
  <!-- 50 px rows starting at y=40, 6 px gutter (so 56 px stride). -->

  <!-- Row 1 — Workshop X1C (focused, printing 62 %) -->
  <g transform="translate(12,40)">
    <rect width="456" height="50" rx="12" fill="#252B34" stroke="#00B7C3" stroke-width="2"/>
    <circle cx="16" cy="25" r="6" fill="#00B7C3"/>
    <text class="t"    x="32" y="22" font-size="14" font-weight="600">Workshop X1C</text>
    <text class="dim"  x="32" y="40" font-size="11">X1 Carbon · PRINTING</text>
    <text class="ac"   x="444" y="32" font-size="20" font-weight="700" text-anchor="end">62%</text>
  </g>

  <!-- Row 2 — Bedroom A1 mini (idle) -->
  <g transform="translate(12,96)">
    <rect width="456" height="50" rx="12" fill="#252B34" stroke="#2F3742"/>
    <circle cx="16" cy="25" r="6" fill="#8A95A4"/>
    <text class="t"   x="32" y="22" font-size="14" font-weight="600">Bedroom A1 mini</text>
    <text class="dim" x="32" y="40" font-size="11">A1 mini · IDLE</text>
  </g>

  <!-- Row 3 — Lab P1S (paused, HMS active) -->
  <g transform="translate(12,152)">
    <rect width="456" height="50" rx="12" fill="#252B34" stroke="#2F3742"/>
    <circle cx="16" cy="25" r="6" fill="#F5A524"/>
    <text class="t"   x="32" y="22" font-size="14" font-weight="600">Lab P1S</text>
    <text class="dim" x="32" y="40" font-size="11">P1S · PAUSED</text>
  </g>

  <!-- Row 4 — Garage X1E (finished) -->
  <g transform="translate(12,208)">
    <rect width="456" height="50" rx="12" fill="#252B34" stroke="#2F3742"/>
    <circle cx="16" cy="25" r="6" fill="#39D98A"/>
    <text class="t"   x="32" y="22" font-size="14" font-weight="600">Garage X1E</text>
    <text class="dim" x="32" y="40" font-size="11">X1 Carbon · FINISH</text>
  </g>

  <!-- ============ Tab bar ============ -->
  <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
  <rect x="0" y="228" width="480" height="1"  fill="#2F3742"/>
  <!-- Active tab (Printers = index 2) -->
  <rect x="204" y="228" width="72" height="3" rx="2" fill="#00B7C3"/>
  <g font-family="Inter, 'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <text class="dim" x="48"  y="248" font-size="14">⌂</text>
    <text class="dim" x="48"  y="265" font-size="10">Live</text>
    <text class="dim" x="144" y="248" font-size="14">▦</text>
    <text class="dim" x="144" y="265" font-size="10">AMS</text>
    <text class="ac"  x="240" y="248" font-size="14">≡</text>
    <text class="ac"  x="240" y="265" font-size="10">Printers</text>
    <text class="dim" x="336" y="248" font-size="14">⟲</text>
    <text class="dim" x="336" y="265" font-size="10">History</text>
    <text class="dim" x="432" y="248" font-size="14">⚙</text>
    <text class="dim" x="432" y="265" font-size="10">Settings</text>
  </g>
</svg>
