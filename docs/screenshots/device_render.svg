<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard hero render.

  Photorealistic-leaning SVG product shot of the assembled device:
  Guition JC4827W543 (4.3" IPS 480x272 capacitive touch, ESP32-S3 +
  8 MB PSRAM, all on one PCB) sitting in the compact PETG case
  with the chamfered front edge and the integrated 15° desk-stand
  tab. Screen renders the current (v0.17) Live dashboard — Workshop
  X1C printing a benchy at 62 %: brand wordmark header + link badge,
  progress ring, live camera thumbnail, the Pause / Stop / speed
  controls, the chamber-light pill, the fan readout, and the six-tab
  bar (Live / AMS / Printers / Queue / History / Settings).

  No raster assets; everything is layered SVG gradients + paths.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img">
  <title>Bamboard device in its 3D-printed case, screen lit, on a desk</title>
  <desc>Studio render of the assembled Bamboard: light PETG enclosure with a slim 3 mm bezel and chamfered front edge, 4.3 inch IPS touch screen showing the v0.17 Live dashboard (progress ring, camera thumbnail, Pause/Stop/speed controls, chamber light, fan readout, six-tab bar), an integrated desk-stand tab tilting it back 15 degrees, and a USB-C cable trailing off the right side.</desc>

  <defs>
    <!-- ===== Scene ===== -->
    <radialGradient id="scene" cx="32%" cy="14%" r="100%">
      <stop offset="0%"   stop-color="#1c2530"/>
      <stop offset="55%"  stop-color="#10161f"/>
      <stop offset="100%" stop-color="#05080c"/>
    </radialGradient>
    <radialGradient id="spot" cx="22%" cy="10%" r="55%">
      <stop offset="0%"   stop-color="#5c7a93" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10161f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c1118" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#0c1118" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#04060a" stop-opacity="0.95"/>
    </linearGradient>

    <!-- ===== PETG plastic ===== -->
    <linearGradient id="petg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5f3ee"/>
      <stop offset="35%"  stop-color="#e8e5dd"/>
      <stop offset="80%"  stop-color="#c9c4ba"/>
      <stop offset="100%" stop-color="#a8a39a"/>
    </linearGradient>
    <linearGradient id="petgSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bcb6ac"/>
      <stop offset="100%" stop-color="#7d7770"/>
    </linearGradient>
    <linearGradient id="petgStand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9a9388"/>
      <stop offset="100%" stop-color="#615b53"/>
    </linearGradient>
    <linearGradient id="chamfer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="fdm" x="0" y="0" width="200" height="3.6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="1.8" x2="200" y2="1.8" stroke="#000" stroke-opacity="0.045" stroke-width="0.7"/>
    </pattern>

    <!-- ===== Display ===== -->
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#15191e"/>
      <stop offset="100%" stop-color="#0b0e12"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080a0d"/>
      <stop offset="100%" stop-color="#101418"/>
    </linearGradient>
    <linearGradient id="glassRefl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- ===== Dashboard widgets ===== -->
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00b7c3"/>
      <stop offset="100%" stop-color="#39d98a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00C6D4"/><stop offset="1" stop-color="#008F9B"/>
    </linearGradient>
    <linearGradient id="uiPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B313B"/><stop offset="1" stop-color="#222831"/>
    </linearGradient>
    <symbol id="ic-home" viewBox="0 0 24 24"><path d="M4 11.2 12 4l8 7.2M6 10v9h12v-9M10 19v-5h4v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></symbol>
    <symbol id="ic-drop" viewBox="0 0 24 24"><path d="M12 3.2C12 3.2 5.5 10 5.5 14.5a6.5 6.5 0 0 0 13 0C18.5 10 12 3.2 12 3.2Z" fill="currentColor"/></symbol>
    <symbol id="ic-list" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 7h11M8 12h11M8 17h11"/><circle cx="4.2" cy="7" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="12" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="17" r="1.1" fill="currentColor" stroke="none"/></g></symbol>
    <symbol id="ic-loop" viewBox="0 0 24 24"><path d="M19 12a7 7 0 1 1-2.05-4.95M19 4v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-gear" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M12 2.6v3M12 18.4v3M21.4 12h-3M5.6 12h-3M18.6 5.4l-2.1 2.1M7.5 16.5l-2.1 2.1M18.6 18.6l-2.1-2.1M7.5 7.5 5.4 5.4"/></g></symbol>
    <symbol id="ic-wifi" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 9a13 13 0 0 1 16 0"/><path d="M7 12.4a8.5 8.5 0 0 1 10 0"/><path d="M9.6 15.7a4.2 4.2 0 0 1 4.8 0"/></g><circle cx="12" cy="18.6" r="1.3" fill="currentColor"/></symbol>
    <symbol id="ic-download" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7.5 10.5 12 15l4.5-4.5"/><path d="M5 19h14"/></g></symbol>

    <!-- ===== USB-C cable ===== -->
    <linearGradient id="cable" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c2128"/>
      <stop offset="50%"  stop-color="#2c333d"/>
      <stop offset="100%" stop-color="#0d1116"/>
    </linearGradient>

    <!-- ===== Shadows / blur filter ===== -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1200" height="800" fill="url(#scene)"/>
  <rect width="1200" height="800" fill="url(#spot)"/>
  <rect x="0" y="600" width="1200" height="200" fill="url(#floor)"/>

  <!-- Ground shadow under the device (drawn before the device itself) -->
  <ellipse cx="600" cy="715" rx="430" ry="22" fill="#000" opacity="0.55"/>
  <ellipse cx="600" cy="725" rx="360" ry="10" fill="#000" opacity="0.35"/>

  <!-- =========================================================
       DESK STAND TAB
       The back shell's integrated tab pivots out at the bottom
       and tilts the device back 15°. From this near-front angle
       we mainly see its base where it meets the desk — a slim
       PETG sliver behind / below the case.
       ========================================================= -->
  <g>
    <!-- Tab edge poking out behind the device, slightly tilted to imply depth -->
    <polygon points="370,690 830,690 800,710 400,710" fill="url(#petgStand)"/>
    <!-- Tab front face shading -->
    <polygon points="370,690 830,690 820,696 380,696" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- =========================================================
       CASE — front face
       Real device is 112 x 82 mm; rendered at 720 x 520 SVG-px
       (≈ 6.43 px/mm). Slim 3 mm bezel = 19.3 SVG-px around the
       active screen. Corner radius 18 px ≈ 2.8 mm — matches the
       v0.4 outer rounding.
       ========================================================= -->
  <g transform="translate(240,130)">

    <!-- Thin right-side wall hint (3D illusion + USB-C / BOOT cut-outs) -->
    <g transform="translate(718,0)">
      <rect x="0" y="6" width="14" height="508" rx="4" fill="url(#petgSide)"/>
      <!-- Hairline highlight along the chamfered edge -->
      <rect x="0" y="6" width="14" height="2" fill="#ffffff" opacity="0.55"/>
      <!-- USB-C cut-out (y aligned with the GPIO USB-C on the Guition's right edge) -->
      <rect x="4" y="58"  width="10" height="20" rx="3" fill="#0a0d12"/>
      <!-- BOOT button window -->
      <circle cx="9" cy="148" r="6" fill="#0a0d12"/>
      <!-- RST button window -->
      <circle cx="9" cy="218" r="6" fill="#0a0d12"/>
      <!-- microSD slot -->
      <rect x="3" y="334" width="11" height="22" rx="2" fill="#0a0d12"/>
    </g>

    <!-- Body — PETG front face -->
    <rect x="0" y="0" width="720" height="520" rx="18" fill="url(#petg)"/>
    <!-- Subtle FDM layer-line texture -->
    <rect x="0" y="0" width="720" height="520" rx="18" fill="url(#fdm)"/>
    <!-- Chamfered top edge — bright catch suggesting the 0.6 mm 45° -->
    <path d="M 0 18 Q 0 0, 18 0 L 702 0 Q 720 0, 720 18"
          fill="none" stroke="url(#chamfer)" stroke-width="2.5"/>
    <!-- Bottom edge soft shadow -->
    <path d="M 0 502 Q 0 520, 18 520 L 702 520 Q 720 520, 720 502"
          fill="none" stroke="#000" stroke-opacity="0.22" stroke-width="2"/>
    <!-- Left edge gentle vertical highlight -->
    <rect x="3" y="40" width="2" height="440" fill="#ffffff" opacity="0.18"/>
    <!-- Right edge gentle shadow -->
    <rect x="713" y="40" width="3" height="440" fill="#000" opacity="0.18"/>

    <!-- =====================================================
         DISPLAY POCKET + GLASS
         Bezel between case outline and active area:
           horiz = (720 - 611) / 2 = 54.5
           vert  = (520 - 347) / 2 = 86.5
         Active area itself is 611 x 347 (480:272 = 1.764).
         ===================================================== -->

    <!-- Inset shadow (suggests the PCB sits recessed under the bezel) -->
    <rect x="50"  y="82"  width="620" height="356" rx="10" fill="#000" opacity="0.18"/>
    <!-- Bezel ring — dark IPS frame -->
    <rect x="54" y="86" width="612" height="348" rx="8" fill="url(#bezel)"/>
    <!-- Glass surface -->
    <rect x="58" y="90" width="604" height="340" rx="6" fill="url(#glass)"/>
    <!-- Visible active area, exactly 480x272 scaled by 1.273 -->
    <g transform="translate(58.5,89.5) scale(1.2729,1.2757)">

      <!-- Background (matches C_BG = 0x0E1116) -->
      <rect width="480" height="272" fill="#0E1116"/>

      <!-- Header — brand wordmark + focused printer + Wi-Fi link badge -->
      <rect x="0" y="0"  width="480" height="36" fill="#1A1F26"/>
      <rect x="0" y="35" width="480" height="1"  fill="#2F3742"/>
      <rect x="12" y="13" width="10" height="10" rx="3" fill="url(#acc)"/>
      <text font-family="Inter, 'Segoe UI', system-ui, sans-serif"
            x="29" y="24" font-size="16" font-weight="700" fill="#E9EEF3">Bam<tspan fill="#00B7C3">board</tspan></text>
      <text font-family="Inter, 'Segoe UI', system-ui, sans-serif"
            x="248" y="23" font-size="13" text-anchor="middle" fill="#8A95A4">Workshop X1C</text>
      <g transform="translate(398,8)">
        <rect width="70" height="20" rx="10" fill="#15271F" stroke="#2F3742"/>
        <use href="#ic-wifi" x="7" y="3" width="14" height="14" style="color:#39D98A"/>
        <text font-family="Inter, 'Segoe UI', system-ui, sans-serif" x="26" y="14" font-size="11" font-weight="600" fill="#39D98A">36 ms</text>
      </g>

      <!-- Top row: progress ring · state pill · live camera thumbnail · ETA / file / layer -->
      <g transform="translate(42,66)">
        <circle r="30" fill="none" stroke="#252B34" stroke-width="6"/>
        <circle r="30" fill="none" stroke="url(#arcGrad)" stroke-width="6"
                stroke-linecap="round" stroke-dasharray="116.9 188.5" transform="rotate(-90)"/>
        <text font-family="Inter, 'Segoe UI', system-ui, sans-serif"
              font-size="16" font-weight="700" fill="#E9EEF3"
              text-anchor="middle" dominant-baseline="central">62%</text>
      </g>
      <g transform="translate(88,40)" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
        <rect width="104" height="24" rx="12" fill="#0E2A2E" stroke="#017782"/>
        <circle cx="15" cy="12" r="4" fill="url(#acc)"/>
        <text x="28" y="17" font-size="14" font-weight="700" fill="#2BE0EC">PRINTING</text>
      </g>
      <!-- inline camera thumbnail (revealed once a real frame has decoded) -->
      <g transform="translate(214,40)">
        <rect width="100" height="52" rx="8" fill="#05070a" stroke="#2F3742"/>
        <rect x="3" y="3" width="94" height="46" rx="6" fill="#0c1116"/>
        <rect x="12" y="32" width="76" height="13" rx="2" fill="#1b212a"/>
        <rect x="42" y="14" width="18" height="20" rx="1" fill="#222a33"/>
        <circle cx="51" cy="13" r="2.5" fill="#39D98A" opacity="0.75"/>
      </g>
      <g font-family="Inter, 'Segoe UI', system-ui, sans-serif">
        <text x="468" y="54" font-size="16" font-weight="700" text-anchor="end" fill="#E9EEF3">ETA 1h12 · 14:32</text>
        <text x="88"  y="86" font-size="12" fill="#8A95A4">benchy_v2_pla.3mf</text>
        <text x="468" y="86" font-size="12" text-anchor="end" fill="#8A95A4">layer 164 / 267</text>
      </g>

      <!-- Temperature cells — 3 equal 146 px -->
      <g font-family="Inter, 'Segoe UI', system-ui, sans-serif">
        <g transform="translate(12,100)">
          <rect width="146" height="36" rx="12" fill="url(#uiPanel)" stroke="#2F3742"/>
          <text x="12"  y="15" font-size="9" font-weight="700" letter-spacing="1.2" fill="#8A95A4">NOZZLE</text>
          <text x="134" y="27" font-size="15" font-weight="700" text-anchor="end" fill="#E9EEF3">220 °C</text>
        </g>
        <g transform="translate(167,100)">
          <rect width="146" height="36" rx="12" fill="url(#uiPanel)" stroke="#2F3742"/>
          <text x="12"  y="15" font-size="9" font-weight="700" letter-spacing="1.2" fill="#8A95A4">BED</text>
          <text x="134" y="27" font-size="15" font-weight="700" text-anchor="end" fill="#E9EEF3">60 °C</text>
        </g>
        <g transform="translate(322,100)">
          <rect width="146" height="36" rx="12" fill="url(#uiPanel)" stroke="#2F3742"/>
          <text x="12"  y="15" font-size="9" font-weight="700" letter-spacing="1.2" fill="#8A95A4">CHAMBER</text>
          <text x="134" y="27" font-size="15" font-weight="700" text-anchor="end" fill="#E9EEF3">38 °C</text>
        </g>
      </g>

      <!-- Fan readout (shown when no HMS error) + chamber-light toggle pill (amber when lit) -->
      <text font-family="Inter, 'Segoe UI', system-ui, sans-serif"
            x="12" y="156" font-size="12" fill="#8A95A4">Fan 100%  ·  Aux 40%  ·  Cha 0%</text>
      <g transform="translate(404,138)" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
        <rect width="64" height="24" rx="12" fill="#F5A524"/>
        <text x="32" y="16" font-size="13" font-weight="600" text-anchor="middle" fill="#0E1116">Light</text>
      </g>

      <!-- Inline action row while printing: Pause · Stop (two-tap) · speed button -->
      <g font-family="Inter, 'Segoe UI', system-ui, sans-serif">
        <g transform="translate(12,164)">
          <rect width="146" height="44" rx="18" fill="url(#acc)"/>
          <text x="73" y="28" font-size="16" font-weight="600" text-anchor="middle" fill="#0E1116">Pause</text>
        </g>
        <g transform="translate(164,164)">
          <rect width="120" height="44" rx="18" fill="#F5A524"/>
          <text x="60" y="28" font-size="16" font-weight="600" text-anchor="middle" fill="#0E1116">Stop</text>
        </g>
        <g transform="translate(290,164)">
          <rect width="178" height="44" rx="18" fill="url(#uiPanel)" stroke="#2F3742"/>
          <text x="20" y="28" font-size="15" font-weight="600" fill="#E9EEF3">Standard</text>
          <path d="M150 18 l7 7 l7 -7" fill="none" stroke="#8A95A4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>

      <!-- Tab bar — six tabs (Live / AMS / Printers / Queue / History / Settings) -->
      <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
      <rect x="0" y="228" width="480" height="1"  fill="#2F3742"/>
      <rect x="0" y="229" width="80" height="43" fill="#0E2A2E" opacity="0.55"/>
      <rect x="12" y="228" width="56" height="3" rx="2" fill="url(#acc)"/>
      <g font-family="Inter, 'Segoe UI', system-ui, sans-serif" text-anchor="middle">
        <use href="#ic-home" x="30"  y="234" width="20" height="20" style="color:#00B7C3"/>
        <text x="40"  y="266" font-size="10" fill="#00B7C3">Live</text>
        <use href="#ic-drop" x="110" y="234" width="20" height="20" style="color:#8A95A4"/>
        <text x="120" y="266" font-size="10" fill="#8A95A4">AMS</text>
        <use href="#ic-list" x="190" y="234" width="20" height="20" style="color:#8A95A4"/>
        <text x="200" y="266" font-size="10" fill="#8A95A4">Printers</text>
        <use href="#ic-download" x="270" y="234" width="20" height="20" style="color:#8A95A4"/>
        <text x="280" y="266" font-size="10" fill="#8A95A4">Queue</text>
        <use href="#ic-loop" x="350" y="234" width="20" height="20" style="color:#8A95A4"/>
        <text x="360" y="266" font-size="10" fill="#8A95A4">History</text>
        <use href="#ic-gear" x="430" y="234" width="20" height="20" style="color:#8A95A4"/>
        <text x="440" y="266" font-size="10" fill="#8A95A4">Settings</text>
      </g>
    </g>

    <!-- Glass reflection sweep (top-band glossy highlight) -->
    <rect x="58" y="90" width="604" height="170" rx="6" fill="url(#glassRefl)"/>
    <!-- Diagonal specular glint -->
    <polygon points="58,90 200,90 95,260 58,260" fill="#ffffff" opacity="0.04"/>

  </g>

  <!-- =========================================================
       USB-C CABLE — trails off the right side of the case
       Connector head sits flush against the right wall, the
       sleeve drapes down and curves off the canvas.
       ========================================================= -->
  <g transform="translate(972,180)">
    <!-- Plug head -->
    <rect x="-6" y="-9" width="22" height="18" rx="4" fill="#23272d" stroke="#0e1115" stroke-width="0.8"/>
    <rect x="14" y="-7" width="18" height="14" rx="3" fill="#1a1d22"/>
    <!-- Cable shadow -->
    <path d="M 32 0 Q 130 60, 200 110 T 320 200"
          stroke="#000" stroke-opacity="0.55" stroke-width="14"
          fill="none" stroke-linecap="round"/>
    <!-- Cable body -->
    <path d="M 32 0 Q 130 60, 200 110 T 320 200"
          stroke="url(#cable)" stroke-width="9"
          fill="none" stroke-linecap="round"/>
    <!-- Cable highlight -->
    <path d="M 32 -2 Q 130 58, 200 108 T 320 198"
          stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- =========================================================
       Subtle bottom-cast soft glow from the lit display
       ========================================================= -->
  <ellipse cx="600" cy="720" rx="380" ry="14" fill="#00b7c3" opacity="0.06"/>
</svg>
