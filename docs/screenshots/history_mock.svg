<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard v0.4 History (stats + recent archives), 1:1 (480 x 272).

  Layout (matches firmware/src/ui/screens/history.cpp):
    Header     : y =   0 ..  36
    KPI strip  : y =  40 ..  88   (4 KPIs in one panel)
    Archive list: y =  92 .. 224  (28-px rows, 4-px gap)
    Tab bar    : y = 228 .. 272
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 272" width="480" height="272">
  <style>
    .t   { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #E9EEF3; }
    .dim { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #8A95A4; }
    .ac  { fill: #00B7C3; }
    .ok  { fill: #39D98A; }
    .warn{ fill: #F5A524; }
    .err { fill: #E5484D; }
  </style>

  <!-- Background -->
  <rect width="480" height="272" fill="#0E1116"/>

  <!-- ============ Header ============ -->
  <rect x="0" y="0"  width="480" height="36" fill="#1A1F26"/>
  <rect x="0" y="35" width="480" height="1"  fill="#2F3742"/>
  <text class="t ac" x="12"  y="24" font-size="18" font-weight="700">Bamboard</text>
  <text class="t"    x="240" y="22" font-size="14" text-anchor="middle">Workshop X1C</text>
  <text class="ok"   x="468" y="22" font-size="12" text-anchor="end" font-weight="600">▲ 36 ms</text>

  <!-- ============ KPI strip ============ -->
  <g transform="translate(12,40)">
    <rect width="456" height="48" rx="12" fill="#252B34" stroke="#2F3742"/>
    <!-- PRINTS -->
    <text class="dim" x="14"  y="16" font-size="9"  font-weight="700" letter-spacing="1">PRINTS</text>
    <text class="t"   x="14"  y="36" font-size="14" font-weight="700">1234</text>
    <!-- SUCCESS -->
    <text class="dim" x="124" y="16" font-size="9"  font-weight="700" letter-spacing="1">SUCCESS</text>
    <text class="ok"  x="124" y="36" font-size="14" font-weight="700">89.1%</text>
    <!-- FILAMENT -->
    <text class="dim" x="244" y="16" font-size="9"  font-weight="700" letter-spacing="1">FILAMENT</text>
    <text class="t"   x="244" y="36" font-size="14" font-weight="700">15000 g</text>
    <!-- TIME -->
    <text class="dim" x="364" y="16" font-size="9"  font-weight="700" letter-spacing="1">TIME</text>
    <text class="t"   x="364" y="36" font-size="14" font-weight="700">100 h</text>
  </g>

  <!-- ============ Archive rows ============ -->
  <!-- 28 px rows, 4 px gap, starting at y=92. -->

  <g transform="translate(12,92)">
    <rect width="456" height="28" rx="8" fill="#252B34" stroke="#2F3742"/>
    <circle cx="14" cy="14" r="4" fill="#39D98A"/>
    <text class="t"   x="28"  y="18" font-size="12" font-weight="600">benchy_v2_pla.3mf</text>
    <text class="dim" x="448" y="18" font-size="11" text-anchor="end">135m · 45g</text>
  </g>
  <g transform="translate(12,124)">
    <rect width="456" height="28" rx="8" fill="#252B34" stroke="#2F3742"/>
    <circle cx="14" cy="14" r="4" fill="#39D98A"/>
    <text class="t"   x="28"  y="18" font-size="12" font-weight="600">voron_z_idler.3mf</text>
    <text class="dim" x="448" y="18" font-size="11" text-anchor="end">42m · 18g</text>
  </g>
  <g transform="translate(12,156)">
    <rect width="456" height="28" rx="8" fill="#252B34" stroke="#2F3742"/>
    <circle cx="14" cy="14" r="4" fill="#E5484D"/>
    <text class="t"   x="28"  y="18" font-size="12" font-weight="600">phone_stand_v3.3mf</text>
    <text class="dim" x="448" y="18" font-size="11" text-anchor="end">7m · 3g</text>
  </g>
  <g transform="translate(12,188)">
    <rect width="456" height="28" rx="8" fill="#252B34" stroke="#2F3742"/>
    <circle cx="14" cy="14" r="4" fill="#39D98A"/>
    <text class="t"   x="28"  y="18" font-size="12" font-weight="600">cable_clip_x12.3mf</text>
    <text class="dim" x="448" y="18" font-size="11" text-anchor="end">88m · 26g</text>
  </g>

  <!-- ============ Tab bar ============ -->
  <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
  <rect x="0" y="228" width="480" height="1"  fill="#2F3742"/>
  <!-- Active tab (History = index 3) -->
  <rect x="300" y="228" width="72" height="3" rx="2" fill="#00B7C3"/>
  <g font-family="Inter, 'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <text class="dim" x="48"  y="248" font-size="14">⌂</text>
    <text class="dim" x="48"  y="265" font-size="10">Live</text>
    <text class="dim" x="144" y="248" font-size="14">▦</text>
    <text class="dim" x="144" y="265" font-size="10">AMS</text>
    <text class="dim" x="240" y="248" font-size="14">≡</text>
    <text class="dim" x="240" y="265" font-size="10">Printers</text>
    <text class="ac"  x="336" y="248" font-size="14">⟲</text>
    <text class="ac"  x="336" y="265" font-size="10">History</text>
    <text class="dim" x="432" y="248" font-size="14">⚙</text>
    <text class="dim" x="432" y="265" font-size="10">Settings</text>
  </g>
</svg>
