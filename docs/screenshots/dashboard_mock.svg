<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard v0.4 Live dashboard, 1:1 scale of the JC4827W543 (480 x 272).

  Layout grid (matches firmware/src/ui/screens/dashboard.cpp):
    Header        : y =   0 ..  36
    Body content  : y =  36 .. 228
      - progress arc + state / file / ETA / layer  : y =  36 .. 100
      - 3-cell temperature row                     : y = 100 .. 136
      - speed segmented chip (SPEED caption above) : y = 150 .. 208
    Tab bar       : y = 228 .. 272
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 272" width="480" height="272">
  <style>
    .t   { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #E9EEF3; }
    .dim { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #8A95A4; }
    .inv { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #0E1116; }
    .ac  { fill: #00B7C3; }
    .ok  { fill: #39D98A; }
  </style>

  <!-- Background -->
  <rect width="480" height="272" fill="#0E1116"/>

  <!-- ============ Header (y 0..36) ============ -->
  <rect x="0" y="0" width="480" height="36" fill="#1A1F26"/>
  <rect x="0" y="35" width="480" height="1" fill="#2F3742"/>
  <text class="t ac" x="12"  y="24" font-size="18" font-weight="700">Bamboard</text>
  <text class="t"    x="240" y="22" font-size="14" text-anchor="middle">Workshop X1C</text>
  <text class="ok"   x="468" y="22" font-size="12" text-anchor="end" font-weight="600">▲ 36 ms</text>

  <!-- ============ Progress arc (top-left) ============ -->
  <!-- Arc center (42, 66), radius 27, stroke 6.
       Circumference = 2*PI*27 ~ 169.6. For 62 %: dash ~ 105.1 -->
  <g transform="translate(42,66)">
    <circle r="27" fill="none" stroke="#252B34" stroke-width="6"/>
    <circle r="27" fill="none" stroke="#00B7C3" stroke-width="6"
            stroke-linecap="round"
            stroke-dasharray="105.1 169.6"
            transform="rotate(-90)"/>
    <text class="t" font-size="13" font-weight="700"
          text-anchor="middle" dominant-baseline="central">62%</text>
  </g>

  <!-- ============ Top-right info column ============ -->
  <text class="t ac" x="88"  y="54" font-size="18" font-weight="700">PRINTING</text>
  <text class="t"    x="468" y="54" font-size="14" text-anchor="end" font-weight="600">ETA 1h12</text>
  <text class="dim"  x="88"  y="74" font-size="11">benchy_v2_pla.3mf</text>
  <text class="dim"  x="468" y="74" font-size="11" text-anchor="end">layer 164 / 267</text>

  <!-- ============ Temperature row (y 100..136) ============ -->
  <g transform="translate(12,100)">
    <rect width="142" height="36" rx="12" fill="#252B34" stroke="#2F3742"/>
    <text class="dim" x="10"  y="13" font-size="9" font-weight="700" letter-spacing="1">NOZZLE</text>
    <text class="t"   x="132" y="25" font-size="14" font-weight="700" text-anchor="end">220 °C</text>
  </g>
  <g transform="translate(162,100)">
    <rect width="142" height="36" rx="12" fill="#252B34" stroke="#2F3742"/>
    <text class="dim" x="10"  y="13" font-size="9" font-weight="700" letter-spacing="1">BED</text>
    <text class="t"   x="132" y="25" font-size="14" font-weight="700" text-anchor="end">60 °C</text>
  </g>
  <g transform="translate(312,100)">
    <rect width="156" height="36" rx="12" fill="#252B34" stroke="#2F3742"/>
    <text class="dim" x="10"  y="13" font-size="9" font-weight="700" letter-spacing="1">CHAMBER</text>
    <text class="t"   x="146" y="25" font-size="14" font-weight="700" text-anchor="end">35 °C</text>
  </g>

  <!-- ============ Speed segmented chip (y 164..208) ============ -->
  <text class="dim" x="16" y="160" font-size="9" font-weight="700" letter-spacing="1">SPEED</text>
  <g transform="translate(12,164)">
    <rect width="456" height="44" rx="18" fill="#252B34" stroke="#2F3742"/>
    <!-- 4 segments, each 112 px wide, offset 3 px inside the pill -->
    <g transform="translate(3,3)">
      <!-- Silent (inactive) -->
      <rect x="0"   y="0" width="112" height="38" rx="8" fill="#252B34"/>
      <text class="dim" x="56"  y="24" font-size="13" text-anchor="middle">Silent</text>
      <!-- Standard (active) -->
      <rect x="112" y="0" width="112" height="38" rx="8" fill="#00B7C3"/>
      <text class="inv" x="168" y="24" font-size="13" font-weight="600" text-anchor="middle">Standard</text>
      <!-- Sport (inactive) -->
      <rect x="224" y="0" width="112" height="38" rx="8" fill="#252B34"/>
      <text class="dim" x="280" y="24" font-size="13" text-anchor="middle">Sport</text>
      <!-- Ludicrous (inactive) -->
      <rect x="336" y="0" width="112" height="38" rx="8" fill="#252B34"/>
      <text class="dim" x="392" y="24" font-size="13" text-anchor="middle">Ludicrous</text>
    </g>
  </g>

  <!-- ============ Tab bar (y 228..272) ============ -->
  <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
  <rect x="0" y="228" width="480" height="1" fill="#2F3742"/>
  <!-- Active tab (Live = index 0): 3 px accent strip + accent labels -->
  <rect x="12" y="228" width="72" height="3" rx="2" fill="#00B7C3"/>
  <g font-family="Inter, 'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <!-- Live (active) -->
    <text class="ac"  x="48"  y="248" font-size="14">⌂</text>
    <text class="ac"  x="48"  y="265" font-size="10">Live</text>
    <!-- AMS -->
    <text class="dim" x="144" y="248" font-size="14">▦</text>
    <text class="dim" x="144" y="265" font-size="10">AMS</text>
    <!-- Printers -->
    <text class="dim" x="240" y="248" font-size="14">≡</text>
    <text class="dim" x="240" y="265" font-size="10">Printers</text>
    <!-- History -->
    <text class="dim" x="336" y="248" font-size="14">⟲</text>
    <text class="dim" x="336" y="265" font-size="10">History</text>
    <!-- Settings -->
    <text class="dim" x="432" y="248" font-size="14">⚙</text>
    <text class="dim" x="432" y="265" font-size="10">Settings</text>
  </g>
</svg>
