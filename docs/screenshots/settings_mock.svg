<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard Settings — visual refresh, 1:1 scale of the JC4827W543 (480 x 272).

  Layout (target for firmware/src/ui/screens/settings.cpp):
    Header           : y =   0 ..  36   Bamboard wordmark · printer · link badge
    Diagnostics card : y =  42 .. 142   Bambuddy / IP / RSSI / Uptime / Firmware
    Brightness row   : y = 150 .. 182   label + 1..5 segmented selector
    Factory-reset pill: y = 190 .. 222  two-tap confirm (turns red when armed)
    Tab bar          : y = 228 .. 272
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 272" width="480" height="272" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#00C6D4"/><stop offset="1" stop-color="#008F9B"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2B313B"/><stop offset="1" stop-color="#222831"/></linearGradient>
    <filter id="cardSh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/></filter>
    <symbol id="ic-home" viewBox="0 0 24 24"><path d="M4 11.2 12 4l8 7.2M6 10v9h12v-9M10 19v-5h4v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></symbol>
    <symbol id="ic-drop" viewBox="0 0 24 24"><path d="M12 3.2C12 3.2 5.5 10 5.5 14.5a6.5 6.5 0 0 0 13 0C18.5 10 12 3.2 12 3.2Z" fill="currentColor"/></symbol>
    <symbol id="ic-list" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 7h11M8 12h11M8 17h11"/><circle cx="4.2" cy="7" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="12" r="1.1" fill="currentColor" stroke="none"/><circle cx="4.2" cy="17" r="1.1" fill="currentColor" stroke="none"/></g></symbol>
    <symbol id="ic-loop" viewBox="0 0 24 24"><path d="M19 12a7 7 0 1 1-2.05-4.95M19 4v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-gear" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M12 2.6v3M12 18.4v3M21.4 12h-3M5.6 12h-3M18.6 5.4l-2.1 2.1M7.5 16.5l-2.1 2.1M18.6 18.6l-2.1-2.1M7.5 7.5 5.4 5.4"/></g></symbol>
    <symbol id="ic-wifi" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 9a13 13 0 0 1 16 0"/><path d="M7 12.4a8.5 8.5 0 0 1 10 0"/><path d="M9.6 15.7a4.2 4.2 0 0 1 4.8 0"/></g><circle cx="12" cy="18.6" r="1.3" fill="currentColor"/></symbol>
    <symbol id="ic-trash" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M7 7l1 12a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-12"/><path d="M10 11v6M14 11v6"/></g></symbol>
  </defs>

  <rect width="480" height="272" fill="#0E1116"/>

  <!-- Header -->
  <rect x="0" y="0" width="480" height="36" fill="#1A1F26"/>
  <rect x="0" y="35" width="480" height="1" fill="#2F3742"/>
  <rect x="12" y="13" width="10" height="10" rx="3" fill="url(#acc)"/>
  <text x="29" y="24" font-size="16" font-weight="700" fill="#E9EEF3">Bam<tspan fill="#00B7C3">board</tspan></text>
  <text x="248" y="23" font-size="13" text-anchor="middle" fill="#8A95A4">Workshop X1C</text>
  <g transform="translate(398,8)"><rect width="70" height="20" rx="10" fill="#15271F" stroke="#2F3742"/><use href="#ic-wifi" x="7" y="3" width="14" height="14" style="color:#39D98A"/><text x="26" y="14" font-size="11" font-weight="600" fill="#39D98A">36 ms</text></g>

  <!-- Diagnostics card -->
  <g transform="translate(12,42)">
    <rect width="456" height="100" rx="12" fill="url(#panel)" stroke="#2F3742" filter="url(#cardSh)"/>
    <text x="16" y="24" font-size="11" fill="#8A95A4">Bambuddy</text>
    <text x="150" y="24" font-size="12" fill="#E9EEF3">http://192.168.1.42:8000</text>
    <line x1="14" y1="33" x2="442" y2="33" stroke="#2F3742" opacity="0.6"/>
    <text x="16" y="43" font-size="11" fill="#8A95A4">Local IP</text>
    <text x="150" y="43" font-size="12" fill="#E9EEF3">192.168.1.42</text>
    <line x1="14" y1="52" x2="442" y2="52" stroke="#2F3742" opacity="0.6"/>
    <text x="16" y="62" font-size="11" fill="#8A95A4">Wi-Fi RSSI</text>
    <text x="150" y="62" font-size="12" fill="#E9EEF3">-58 dBm</text>
    <line x1="14" y1="71" x2="442" y2="71" stroke="#2F3742" opacity="0.6"/>
    <text x="16" y="81" font-size="11" fill="#8A95A4">Uptime</text>
    <text x="150" y="81" font-size="12" fill="#E9EEF3">3h 14m 27s</text>
    <line x1="14" y1="90" x2="442" y2="90" stroke="#2F3742" opacity="0.6"/>
    <text x="16" y="100" font-size="11" fill="#8A95A4">Firmware</text>
    <text x="150" y="100" font-size="12" fill="#E9EEF3">0.9.1</text>
  </g>

  <!-- Brightness row -->
  <text x="16" y="170" font-size="13" fill="#8A95A4">Brightness</text>
  <g transform="translate(150,151)">
    <rect width="318" height="30" rx="15" fill="#1A1F26" stroke="#2F3742"/>
    <g transform="translate(3,3)">
      <rect x="0"     y="0" width="62.4" height="24" rx="9" fill="#252B34"/><text x="31.2"  y="17" font-size="13" text-anchor="middle" fill="#8A95A4">1</text>
      <rect x="62.4"  y="0" width="62.4" height="24" rx="9" fill="#252B34"/><text x="93.6"  y="17" font-size="13" text-anchor="middle" fill="#8A95A4">2</text>
      <rect x="124.8" y="0" width="62.4" height="24" rx="9" fill="url(#acc)"/><text x="156"   y="17" font-size="13" font-weight="700" text-anchor="middle" fill="#0E1116">3</text>
      <rect x="187.2" y="0" width="62.4" height="24" rx="9" fill="#252B34"/><text x="218.4" y="17" font-size="13" text-anchor="middle" fill="#8A95A4">4</text>
      <rect x="249.6" y="0" width="62.4" height="24" rx="9" fill="#252B34"/><text x="280.8" y="17" font-size="13" text-anchor="middle" fill="#8A95A4">5</text>
    </g>
  </g>

  <!-- Factory reset pill -->
  <g transform="translate(12,190)">
    <rect width="456" height="32" rx="16" fill="url(#panel)" stroke="#2F3742"/>
    <use href="#ic-trash" x="180" y="6" width="20" height="20" style="color:#E5484D"/>
    <text x="206" y="21" font-size="14" font-weight="600" fill="#E9EEF3">Factory reset</text>
  </g>

  <!-- Tab bar (Settings = index 4) -->
  <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
  <rect x="0" y="228" width="480" height="1" fill="#2F3742"/>
  <rect x="386" y="229" width="92" height="43" fill="#0E2A2E" opacity="0.55"/>
  <rect x="396" y="228" width="72" height="3" rx="2" fill="url(#acc)"/>
  <g text-anchor="middle">
    <use href="#ic-home" x="38" y="234" width="20" height="20" style="color:#8A95A4"/><text x="48" y="266" font-size="10" fill="#8A95A4">Live</text>
    <use href="#ic-drop" x="134" y="234" width="20" height="20" style="color:#8A95A4"/><text x="144" y="266" font-size="10" fill="#8A95A4">AMS</text>
    <use href="#ic-list" x="230" y="234" width="20" height="20" style="color:#8A95A4"/><text x="240" y="266" font-size="10" fill="#8A95A4">Printers</text>
    <use href="#ic-loop" x="326" y="234" width="20" height="20" style="color:#8A95A4"/><text x="336" y="266" font-size="10" fill="#8A95A4">History</text>
    <use href="#ic-gear" x="422" y="234" width="20" height="20" style="color:#00B7C3"/><text x="432" y="266" font-size="10" fill="#00B7C3">Settings</text>
  </g>
</svg>
