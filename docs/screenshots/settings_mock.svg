<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bamboard v1.1 Settings, 1:1 (480 x 272).

  Layout (matches firmware/src/ui/screens/settings.cpp):
    Header                : y =   0 ..  36
    Read-only rows        : y =  38 .. 124  (Bambuddy / IP / RSSI / Uptime)
    Brightness 1..5       : y = 126 ..  158
    Factory-reset pill    : y = 176 ..  220
    Tab bar               : y = 228 ..  272
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 272" width="480" height="272">
  <style>
    .t   { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #E9EEF3; }
    .dim { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #8A95A4; }
    .inv { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; fill: #0E1116; }
    .ac  { fill: #00B7C3; }
    .ok  { fill: #39D98A; }
  </style>

  <!-- Background -->
  <rect width="480" height="272" fill="#0E1116"/>

  <!-- ============ Header ============ -->
  <rect x="0" y="0"  width="480" height="36" fill="#1A1F26"/>
  <rect x="0" y="35" width="480" height="1"  fill="#2F3742"/>
  <text class="t ac" x="12"  y="24" font-size="18" font-weight="700">Bamboard</text>
  <text class="t"    x="240" y="22" font-size="14" text-anchor="middle">Workshop X1C</text>
  <text class="ok"   x="468" y="22" font-size="12" text-anchor="end" font-weight="600">▲ 36 ms</text>

  <!-- ============ Read-only diagnostics ============ -->
  <!-- Each row: caption at x=30, value at x=148. 20 px stride. -->
  <g transform="translate(0,36)">
    <text class="dim" x="30"  y="20" font-size="11">Bambuddy</text>
    <text class="t"   x="148" y="20" font-size="12">http://192.168.1.42:8000</text>

    <text class="dim" x="30"  y="40" font-size="11">Local IP</text>
    <text class="t"   x="148" y="40" font-size="12">192.168.1.42</text>

    <text class="dim" x="30"  y="60" font-size="11">Wi-Fi RSSI</text>
    <text class="t"   x="148" y="60" font-size="12">-58 dBm</text>

    <text class="dim" x="30"  y="80" font-size="11">Uptime</text>
    <text class="t"   x="148" y="80" font-size="12">3h 14m 27s</text>

    <!-- Brightness label -->
    <text class="dim" x="30"  y="108" font-size="11">Brightness</text>
  </g>

  <!-- ============ Brightness 1..5 segmented ============ -->
  <g transform="translate(130,118)">
    <rect width="332" height="32" rx="18" fill="#252B34" stroke="#2F3742"/>
    <!-- 5 segments. Outer pad 2; each seg width = (332 - 4)/5 = 65.6. -->
    <g transform="translate(2,2)">
      <rect x="0"      y="0" width="65.6" height="28" rx="8" fill="#252B34"/>
      <text class="dim" x="32.8"  y="19" font-size="13" text-anchor="middle">1</text>

      <rect x="65.6"  y="0" width="65.6" height="28" rx="8" fill="#252B34"/>
      <text class="dim" x="98.4" y="19" font-size="13" text-anchor="middle">2</text>

      <!-- Level 3 active -->
      <rect x="131.2" y="0" width="65.6" height="28" rx="8" fill="#00B7C3"/>
      <text class="inv" x="164" y="19" font-size="13" font-weight="600" text-anchor="middle">3</text>

      <rect x="196.8" y="0" width="65.6" height="28" rx="8" fill="#252B34"/>
      <text class="dim" x="229.6" y="19" font-size="13" text-anchor="middle">4</text>

      <rect x="262.4" y="0" width="65.6" height="28" rx="8" fill="#252B34"/>
      <text class="dim" x="295.2" y="19" font-size="13" text-anchor="middle">5</text>
    </g>
  </g>

  <!-- ============ Factory reset pill ============ -->
  <g transform="translate(18,176)">
    <rect width="444" height="44" rx="18" fill="#252B34" stroke="#2F3742"/>
    <text class="t" x="222" y="28" font-size="14" font-weight="600" text-anchor="middle">⌫  Factory reset</text>
  </g>

  <!-- ============ Tab bar ============ -->
  <rect x="0" y="228" width="480" height="44" fill="#1A1F26"/>
  <rect x="0" y="228" width="480" height="1"  fill="#2F3742"/>
  <!-- Active tab (Settings = index 4) -->
  <rect x="396" y="228" width="72" height="3" rx="2" fill="#00B7C3"/>
  <g font-family="Inter, 'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <text class="dim" x="48"  y="248" font-size="14">⌂</text>
    <text class="dim" x="48"  y="265" font-size="10">Live</text>
    <text class="dim" x="144" y="248" font-size="14">▦</text>
    <text class="dim" x="144" y="265" font-size="10">AMS</text>
    <text class="dim" x="240" y="248" font-size="14">≡</text>
    <text class="dim" x="240" y="265" font-size="10">Printers</text>
    <text class="dim" x="336" y="248" font-size="14">⟲</text>
    <text class="dim" x="336" y="265" font-size="10">History</text>
    <text class="ac"  x="432" y="248" font-size="14">⚙</text>
    <text class="ac"  x="432" y="265" font-size="10">Settings</text>
  </g>
</svg>
