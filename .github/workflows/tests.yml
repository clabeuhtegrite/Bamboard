name: tests

# Host unit tests + static analysis on Bamboard's own sources. No secrets, no
# hardware, no toolchain download — runs on every push to main and every PR
# (forks included), as a fast gate next to the firmware build (ci.yml) and the
# visual render (sim.yml).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + run host unit tests
        run: |
          cmake -S tests -B tests/build -DCMAKE_BUILD_TYPE=Release
          cmake --build tests/build -j
          ctest --test-dir tests/build --output-on-failure

  # Site scripts: syntax-check the JS and validate the i18n dictionary (valid
  # JSON, identical key set per language, every key used in index.html exists).
  # No toolchain download — node + python3 are preinstalled on the runner.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check the site scripts
        run: |
          node --check web/i18n.js
          node --check web/app.js
      - name: Validate i18n dictionary + key coverage
        run: python3 scripts/validate_i18n.py

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Static analysis (firmware sources, excluding generated fonts)
        run: |
          cppcheck --enable=warning --std=c++17 --inline-suppr \
            --error-exitcode=1 \
            --suppress=missingInclude --suppress=missingIncludeSystem \
            --suppress=unknownMacro --suppress=unusedStructMember \
            --suppress=unmatchedSuppression \
            -i firmware/src/ui/fonts \
            firmware/src

  # Golden-image visual regression: the sim renders deterministic synthetic
  # states (printing / multi-AMS / HMS) with no network or secrets, and we
  # byte-compare them against committed baselines. Catches unintended UI changes
  # on every PR. (The live, real-data renders stay in sim.yml.)
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libcurl4-openssl-dev
      - name: Build sim
        run: |
          cmake -S sim -B sim/build -DCMAKE_BUILD_TYPE=Release
          cmake --build sim/build -j
      - name: Render fixtures (deterministic — no network, no secrets)
        run: SIM_FIXTURES_ONLY=1 SIM_OUT=fx_out ./sim/build/bamboard_sim
      # Composite the live render onto TomE1337's case photo (the hero). Emitted
      # into the fixture-renders artifact (HERO_DEBUG draws the screen quad) so
      # the perspective corners can be calibrated without deploying anything.
      - name: Compose hero render
        run: |
          sudo apt-get install -y imagemagick
          bash scripts/compose_hero.sh docs/screenshots/case.jpg fx_out/live.png fx_out/hero.png
      - name: Compare against committed baselines (or seed them)
        run: |
          if ls tests/fixtures_baseline/*.png >/dev/null 2>&1; then
            fail=0
            for b in tests/fixtures_baseline/*.png; do
              n=$(basename "$b")
              if ! cmp -s "$b" "fx_out/$n"; then
                echo "::error::visual regression in $n (differs from baseline)"; fail=1
              fi
            done
            exit $fail
          else
            echo "::error::no baselines in tests/fixtures_baseline/ — the visual"
            echo "regression gate cannot run. Baselines are required and must be"
            echo "committed (re-seed: SIM_FIXTURES_ONLY=1 ./sim/build/bamboard_sim,"
            echo "then commit fx_out/*.png). Failing rather than passing silently."
            exit 1
          fi
      # Render the same deterministic screens in each non-English language and
      # byte-diff them too — catches i18n layout overflow (a German/Spanish
      # string longer than the English source spilling out of a button/row).
      - name: Render + diff per-language fixtures (i18n layout regression)
        run: |
          fail=0
          for lang in es fr pt de; do
            mkdir -p "fx_i18n/$lang"   # the sim's own mkdir(SIM_OUT) isn't recursive
            SIM_FIXTURES_ONLY=1 BAMBOARD_LANG=$lang SIM_OUT="fx_i18n/$lang" ./sim/build/bamboard_sim
            base="tests/fixtures_baseline/i18n/$lang"
            if ls "$base"/*.png >/dev/null 2>&1; then
              for b in "$base"/*.png; do
                n=$(basename "$b")
                if ! cmp -s "$b" "fx_i18n/$lang/$n"; then
                  echo "::error::i18n regression in $lang/$n (differs from baseline)"; fail=1
                fi
              done
            else
              echo "::error::no i18n baselines for $lang in $base/ — required and"
              echo "must be committed (re-seed: BAMBOARD_LANG=$lang"
              echo "SIM_FIXTURES_ONLY=1 ./sim/build/bamboard_sim). Failing."
              fail=1
            fi
          done
          exit $fail
      - name: Upload fixture renders
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixture-renders
          path: fx_out/*.png
          if-no-files-found: warn
      - name: Upload i18n fixture renders
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixture-renders-i18n
          path: fx_i18n/**/*.png
          if-no-files-found: warn
