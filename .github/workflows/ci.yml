name: ci

# Compile the firmware on every pull request and on pushes to main, so a build
# break is caught here instead of only when a v* release tag is pushed. This is
# build-only — no artifacts are published (that's release.yml's job, on v*
# tags). The build has no version tag, so it reports the 0.0.0-dev sentinel.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref makes the in-flight run obsolete — cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run -e esp32-s3-devkitc-1
