name: release

# Build + publish a firmware release whenever a version tag is pushed.
#
#   git tag v0.6.1 && git push origin v0.6.1
#
# Compiles the firmware with the tag baked in as its version, then creates a
# GitHub Release carrying three assets:
#   firmware.bin           the app image the device flashes over the air
#   bamboard-factory.bin   bootloader + partitions + boot_app0 + app, the full
#                          image the web installer / esptool writes at 0x0
#   manifest.json          {version,url,sha256,md5,size} the device reads for OTA
#
# The web installer (GitHub Pages) is deployed by pages.yml; this workflow
# kicks it via workflow_dispatch once the release is published — a `release`
# event fired by GITHUB_TOKEN would NOT trigger pages.yml on its own (Actions'
# anti-recursion rule), but workflow_dispatch is an explicit exception to it.
# pages.yml also runs on web/ edits, so releases and page tweaks stay decoupled.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for the release-creation step
  actions:  write   # required to dispatch the Pages deploy (pages.yml)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO + esptool
        # esptool is pinned to the 4.x line: its merge_bin sub-command and flags
        # changed in 5.x, and we rely on the 4.x CLI below.
        run: |
          pip install --upgrade platformio
          pip install "esptool>=4.7,<5"

      - name: Derive version from tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.6.1
          FULL="${TAG#v}"                   # e.g. 0.6.1 (used in the manifest)
          NUM="$(printf '%s' "$FULL" | sed -E 's/[-+].*$//')"  # numeric core only
          {
            echo "tag=$TAG"
            echo "full=$FULL"
            echo "num=$NUM"
          } >> "$GITHUB_OUTPUT"

      - name: Generate root-CA bundle (https cert validation)
        working-directory: firmware
        run: bash scripts/gen_ca_bundle.sh

      - name: Build firmware
        working-directory: firmware
        env:
          # Injected as a bare pp-number token; config.h stringifies it into
          # BAMBOARD_VERSION. Appended to build_flags by PlatformIO.
          PLATFORMIO_BUILD_FLAGS: -DBAMBOARD_FW_VERSION=${{ steps.ver.outputs.num }}
        run: pio run -e esp32-s3-devkitc-1

      - name: Merge factory image
        working-directory: firmware
        run: |
          set -euo pipefail
          BD=.pio/build/esp32-s3-devkitc-1
          BOOT_APP0="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          for f in "$BD/bootloader.bin" "$BD/partitions.bin" "$BD/firmware.bin" "$BOOT_APP0"; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done
          # Full-flash image for a fresh device: ESP32-S3 bootloader lives at 0x0
          # (not 0x1000 like the classic ESP32). 'keep' preserves the flash
          # mode/freq/size bytes the PlatformIO build already wrote.
          python -m esptool --chip esp32s3 merge_bin \
            -o "$BD/bamboard-factory.bin" \
            --flash_mode keep --flash_freq keep --flash_size keep \
            0x0     "$BD/bootloader.bin" \
            0x8000  "$BD/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$BD/firmware.bin"
          ls -l "$BD/bamboard-factory.bin"

      - name: Stage release assets
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.ver.outputs.tag }}
          FULL: ${{ steps.ver.outputs.full }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BD="firmware/.pio/build/esp32-s3-devkitc-1"
          cp "$BD/firmware.bin"          dist/firmware.bin
          cp "$BD/bamboard-factory.bin"  dist/bamboard-factory.bin
          SHA="$(sha256sum dist/firmware.bin | cut -d' ' -f1)"
          MD5="$(md5sum    dist/firmware.bin | cut -d' ' -f1)"
          SIZE="$(stat -c%s dist/firmware.bin)"
          # md5 is what the device validates at flash time (ESP32 Update.setMD5);
          # sha256 stays for out-of-band human verification.
          cat > dist/manifest.json <<EOF
          {
            "version": "${FULL}",
            "tag": "${TAG}",
            "url": "https://github.com/${REPO}/releases/download/${TAG}/firmware.bin",
            "sha256": "${SHA}",
            "md5": "${MD5}",
            "size": ${SIZE}
          }
          EOF
          echo "----- manifest.json -----"
          cat dist/manifest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Bamboard ${{ steps.ver.outputs.full }}
          generate_release_notes: true
          # A tag with a pre-release suffix (v1.2.3-rc1, -beta…) is published as a
          # prerelease so it never becomes the "latest" release the device OTA and
          # the Pages installer resolve to. Plain vX.Y.Z tags ship to the fleet.
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: |
            dist/firmware.bin
            dist/bamboard-factory.bin
            dist/manifest.json

      - name: Redeploy web installer with the new release
        # The release is published above; now kick pages.yml so the web
        # installer picks up this release's factory bin. workflow_dispatch is
        # the exception that GITHUB_TOKEN is allowed to trigger.
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
