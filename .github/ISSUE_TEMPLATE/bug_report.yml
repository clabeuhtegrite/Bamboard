name: Bug report
description: Something on the device, the simulator, or the build isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please fill in what you can — it makes triage much faster.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
      placeholder: On the Live screen, the ETA shows … but it should …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Boot with …
        2. Open the … screen
        3. …
    validations:
      required: true
  - type: input
    id: fw-version
    attributes:
      label: Firmware version
      description: Shown on the Settings screen (e.g. `0.23.0`). Use `dev` for a local build.
      placeholder: "0.23.0"
    validations:
      required: true
  - type: input
    id: bambuddy-version
    attributes:
      label: Bambuddy version
      description: Shown on the Settings screen, or in your Bambuddy web UI.
      placeholder: "0.2.x"
  - type: dropdown
    id: transport
    attributes:
      label: How does the device reach Bambuddy?
      options:
        - HTTP on the LAN (private IP / .local)
        - HTTPS by domain
        - HTTPS behind Cloudflare Access
  - type: textarea
    id: logs
    attributes:
      label: Serial log (optional)
      description: 115200 baud. Paste the lines around the problem — the boot line and any `[E]`/`[W]` help most.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Before filing
      options:
        - label: I'm on the latest release (the device self-updates at boot / overnight), or I've noted why not.
          required: true
        - label: This is a Bamboard issue, not a Bambuddy or printer-side one.
          required: true
